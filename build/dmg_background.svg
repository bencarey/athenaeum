<svg xmlns="http://www.w3.org/2000/svg" width="540" height="540" viewBox="0 0 540 540">
  <!-- Square canvas so QuickLook does not pad. The visible DMG window is the
       central 540x380 band (rows 80-460), which we center-crop after rendering. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAFBFC"/>
      <stop offset="1" stop-color="#EFEFF1"/>
    </linearGradient>
  </defs>
  <rect width="540" height="540" fill="url(#g)"/>
  <text x="270" y="160" text-anchor="middle" font-family="-apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="-1.3" fill="#111111">athenaeum.</text>
  <text x="270" y="186" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="10" letter-spacing="3.2" fill="#A1A1A6">A KNOWLEDGE CONTAINER</text>
  <g stroke="#6E6E73" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M234 270 H300"/>
    <path d="M300 270 l-10 -7 M300 270 l-10 7"/>
  </g>
  <text x="270" y="402" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" letter-spacing="0.3" fill="#6E6E73">Drag athenaeum. into your Applications folder</text>
</svg>
