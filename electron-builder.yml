appId: com.bencarey.athenaeum
productName: Athenaeum
directories:
  output: dist
  buildResources: build
files:
  - main.js
  - preload.js
  - reader.html
  - package.json
  - "!resources/pyenv/**/__pycache__/**"
extraResources:
  - from: resources/pyenv
    to: pyenv
  - from: resources/py
    to: py
mac:
  icon: icon.icns
  category: public.app-category.productivity
  target:
    - dmg
dmg:
  artifactName: Athenaeum-${version}.${ext}
  title: Athenaeum ${version}
  background: build/dmg_background.png
  window:
    width: 540
    height: 380
  contents:
    - x: 150
      y: 190
      type: file
    - x: 390
      y: 190
      type: link
      path: /Applications
